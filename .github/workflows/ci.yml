name: CI - api-back

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-api-back-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Checkout engine
        uses: actions/checkout@v6
        with:
          repository: Astrea-EIP/core-moteur
          path: engine

      - name: Build engine
        run: dotnet build engine/lib -c Release -o engine-build

      - name: Copy engine DLL
        run: |
          mkdir -p lib
          test -f engine-build/AstreaEngine.dll
          cp engine-build/AstreaEngine.dll lib/AstreaEngine.dll

      - name: Restore dependencies
        run: dotnet restore api-back.csproj

      - name: Check formatting
        run: dotnet format api-back.csproj --verify-no-changes

      - name: Build backend
        run: dotnet build api-back.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test api-back.csproj --configuration Release --no-build

      - name: Publish
        run: dotnet publish api-back.csproj -c Release -o out --no-build
