name: CI - api-back

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: 📥 Checkout engine
        uses: actions/checkout@v6
        with:
          repository: Astrea-EIP/core-moteur
          path: engine

      - name: 🏗️ Build engine
        run: |
          cd engine/lib
          dotnet build -c Release

      - name: 📦 Restore dependencies
        run: dotnet restore api-back.csproj

      - name: 🔍 Check formatting
        run: dotnet format api-back.csproj --verify-no-changes --exclude engine

      - name: 🏗️ Build backend
        run: dotnet build api-back.csproj --configuration Release

      - name: 🧪 Run tests
        run: dotnet test api-back.csproj --configuration Release

      - name: 📦 Publish
        run: dotnet publish -c Release -o out